<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Deep Work</title>
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div id="timer-page" class="page active">
            <div class="container">
                <h1>Deep Work</h1>
                <div class="timer-card">
                    <div class="timer" id="timer">00:00:00</div>
                </div>
            </div>
        </div>
        <div id="habits-page" class="page">
            <div class="container">
                <h1>Привычки</h1>
                <div class="add-habit">
                    <input id="habitInput" placeholder="Новая привычка">
                    <button id="addBtn">Добавить</button>
                </div>
                <div class="habit-list" id="habitList"></div>
                <div class="habit-stats" id="habitStats" style="display: none;">
                    <button class="back-btn" id="backToHabits">← Назад</button>
                    <h2 id="statsHabitName"></h2>
                    <div class="stats-summary">
                        <div class="stat-box">
                            <span class="stat-value" id="currentStreak">0</span>
                            <span class="stat-label">Текущая серия</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-value" id="bestStreak">0</span>
                            <span class="stat-label">Лучшая серия</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-value" id="totalDays">0</span>
                            <span class="stat-label">Всего дней</span>
                        </div>
                    </div>
                    <h3>За последние 30 дней</h3>
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
        </div>
        
        <div id="skill-page" class="page">
            <div class="container">
                <h1>Разбивка навыка</h1>
                <button id="addRootSkill" class="add-root-btn">+ Добавить корень</button>
                <div id="skill-tree"></div>
            </div>
        </div>
        
        <nav class="nav">
            <button class="nav-btn active" data-page="timer">Таймер</button>
            <button class="nav-btn" data-page="habits">Привычки</button>
            <button class="nav-btn" data-page="skill">Навыки</button>
        </nav>
        <script src="script.js"></script>
    </body>
</html>
